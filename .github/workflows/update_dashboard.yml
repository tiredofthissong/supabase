name: Update Dashboard

on:
  schedule:
    - cron: "0 6 * * *"  # Runs daily at midnight MT
  workflow_dispatch:      # Allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase plotly

      - name: Run dashboard script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python dashboard_test.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add course_dashboard.html
          git diff --staged --quiet || git commit -m "Update dashboard"
          git push